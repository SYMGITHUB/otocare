<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Vehicle Registration - OTO DriveCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1604924018601-7edfa58a3ec0?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(13, 110, 253, 0.7), rgba(0, 0, 0, 0.7)),
                url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .navbar-custom {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border-radius: 0 0 15px 15px;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1;
        }

        .navbar-custom a {
            color: #ffcc00;
            font-weight: bold;
            text-decoration: none;
            margin-right: 20px;
        }

        .navbar-custom a:hover {
            text-decoration: underline;
        }

        .auth-card {
            width: 450px;
            background: rgba(15, 27, 43, 0.95);
            padding: 20px 25px;
            border-radius: 15px;
            box-shadow: 0 12px 35px rgba(69, 37, 37, 0.5);
            color: #fff;
            text-align: center;
            z-index: 1;
            position: relative;
        }

        .auth-card h2 {
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffcc00;
        }

        .auth-card p {
            margin-bottom: 5px;
            font-size: 14px;
            color: #ddd;
        }

        .auth-card input, .auth-card select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .auth-card input::placeholder {
            color: #999;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #ffcc00;
            color: #0f1b2b;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-card button:hover {
            background: #e6b800;
        }

        .auth-card a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-card a:hover {
            text-decoration: underline;
        }

        .alert {
            font-size: 13px;
            padding: 8px;
            background: #ff4d4f;
            color: white;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <div class="navbar-custom">
        <a href="/">Home</a>
    </div>

    <div class="auth-card">
        <h1>OTO DriveCare</h1>
        <h2>Vehicle Registration</h2>
        <p>Enter your vehicle details</p>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}
        <form method="POST" action="">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <input type="text" name="owner_name" placeholder="Owner Name" required>
            <input type="tel" class="form-control" id="contact" placeholder="Enter your contact number" required>
            
            <input type="text" name="vehicle_name" placeholder="Vehicle Name/Model" required>
            <input type="text" name="vehicle_number" placeholder="Vehicle Number" required>
            <select name="vehicle_type" required>
                <option value="">Select Vehicle Type</option>
                <option value="car">Car</option>
                <option value="bike">Bike</option>
                <option value="suv">SUV</option>
            </select>
            <input type="number" name="year" placeholder="Manufacturing Year" required>
            <input type="text" name="color" placeholder="Color" required>

            <button type="submit">Register Vehicle</button>
        </form>

        <p>Want to view vehicles? <a href="/vehicles">View Vehicles</a></p>
    </div>
</body>

</html>
