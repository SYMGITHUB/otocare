<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Workshop — OTO DriveCare Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{--bg:#060d1a;--sidebar:#0b1829;--card:rgba(255,255,255,0.05);--gold:#ffcc00;--gold-dim:rgba(255,204,0,0.1);--text:#f0f4f8;--muted:#6a80a0;--border:rgba(255,255,255,0.08);--sw:230px;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;min-height:100vh;}
        .sidebar{width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);padding:28px 18px;position:fixed;height:100vh;overflow-y:auto;}
        .sidebar .logo{color:var(--gold);font-size:1.1rem;font-weight:800;margin-bottom:32px;}
        .sidebar nav a{display:flex;align-items:center;gap:10px;color:#9ab;text-decoration:none;padding:10px 13px;border-radius:9px;margin-bottom:4px;font-size:0.87rem;transition:0.2s;}
        .sidebar nav a:hover,.sidebar nav a.active{background:var(--gold-dim);color:var(--gold);}
        .sidebar nav .divider{border-top:1px solid var(--border);margin:14px 0;}
        .main{margin-left:var(--sw);flex:1;padding:28px 30px 60px;max-width:760px;}
        h1{font-size:1.4rem;font-weight:800;margin-bottom:24px;} h1 span{color:var(--gold);}
        .card-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px 28px;}
        .form-group{margin-bottom:18px;}
        label{display:block;font-size:0.81rem;color:var(--muted);margin-bottom:6px;font-weight:600;}
        input,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
        input:focus,textarea:focus{border-color:rgba(255,204,0,0.5);}
        input::placeholder,textarea::placeholder{color:var(--muted);}
        textarea{resize:vertical;min-height:80px;}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .toggle-row{display:flex;align-items:center;gap:12px;}
        .toggle-row input[type=checkbox]{width:auto;}
        .btn-submit{background:var(--gold);color:#0b1829;font-weight:800;font-size:1rem;padding:12px 28px;border:none;border-radius:10px;cursor:pointer;margin-top:6px;}
        .btn-submit:hover{background:#e6b800;}
        .btn-cancel{background:rgba(255,255,255,0.06);color:#ccc;font-size:0.88rem;padding:12px 20px;border:1px solid var(--border);border-radius:10px;text-decoration:none;margin-left:10px;}
        .btn-cancel:hover{background:rgba(255,255,255,0.1);color:#fff;}
        .alert-err{background:rgba(255,107,107,0.12);border:1px solid #ff6b6b;color:#ff6b6b;padding:10px 16px;border-radius:10px;font-size:0.87rem;margin-bottom:18px;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">🚗 OTO DriveCare</div>
    <nav>
        <a href="/admin-dashboard/">📊 Dashboard</a>
        <a href="/admin-bookings/">📋 Bookings</a>
        <a href="/admin-payments/">💳 Payments</a>
        <a href="/admin-services/">⚙️ Services</a>
        <a href="/admin-workshops/" class="active">📍 Workshops</a>
        <a href="/admin-users/">👥 Users</a>
        <div class="divider"></div>
        <a href="/admin/">🗄️ Django Admin</a>
        <a href="/">🏠 Home Site</a>
        <a href="/logout/" style="color:#ff6b6b;">🚪 Logout</a>
    </nav>
</div>
<div class="main">
    <h1>📍 <span>{{ action }}</span> Workshop</h1>
    <div class="card-box">
        {% if error %}<div class="alert-err">⚠️ {{ error }}</div>{% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Workshop Name *</label>
                <input type="text" name="name" value="{{ workshop.name|default:'' }}" placeholder="e.g. OTO DriveCare - Main Branch" required>
            </div>
            <div class="form-group">
                <label>Address *</label>
                <textarea name="address" placeholder="Full address of the workshop...">{{ workshop.address|default:'' }}</textarea>
            </div>
            <div class="row2">
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" name="phone" value="{{ workshop.phone|default:'' }}" placeholder="e.g. 9876543210" required>
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" name="email" value="{{ workshop.email|default:'' }}" placeholder="workshop@email.com">
                </div>
            </div>
            <div class="form-group">
                <label>Total Appointment Slots per Day</label>
                <input type="number" name="total_slots" value="{{ workshop.total_slots|default:'10' }}" min="1" max="100">
            </div>
            {% if action == 'Edit' %}
            <div class="form-group">
                <div class="toggle-row">
                    <input type="checkbox" name="is_active" id="is_active" {% if workshop.is_active %}checked{% endif %}>
                    <label for="is_active" style="margin:0;color:var(--text);">Workshop is Active</label>
                </div>
            </div>
            {% endif %}
            <button type="submit" class="btn-submit">{{ action }} Workshop</button>
            <a href="/admin-workshops/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
